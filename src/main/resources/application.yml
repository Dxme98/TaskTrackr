spring:
  profiles:
      active: dev
  security:
      oauth2:
        resourceserver:
            jwt:
              issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/tasktrackr-realm}
  jpa:
    hibernate:
        ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true
        jdbc:
          batch_size: 20
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
logging:
  level:
    root: INFO
    com.dev.tasktrackr: INFO