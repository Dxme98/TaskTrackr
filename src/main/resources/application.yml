spring:
  profiles:
      active: dev
  security:
      oauth2:
        resourceserver:
            jwt:
              issuer-uri: ${KEYCLOAK_JWT_ISSUER_URI}
  jpa:
    hibernate:
        ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true
    show-sql: true
logging:
  level:
    root: INFO
    com.dev.tasktrackr: INFO