spring:
  profiles:
      active: dev
  security:
      oauth2:
        resourceserver:
            jwt:
              issuer-uri: http://localhost:8180/realms/tasktrackr-realm
  jpa:
    hibernate:
        ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true
        jdbc:
          batch_size: 20
    show-sql: true
logging:
  level:
    root: INFO
    com.dev.tasktrackr: INFO